<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motrix Next</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: transparent;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ── Dark theme (default) ───────────────────────────────────── */
    .splash {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #141210;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    /* Indeterminate progress bar — brand amber */
    .progress {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      overflow: hidden;
    }
    .progress::after {
      content: '';
      position: absolute;
      top: 0; left: -30%;
      width: 30%; height: 100%;
      background: linear-gradient(90deg, transparent, #E0A422, transparent);
      animation: slide 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes slide {
      0%   { left: -30%; }
      100% { left: 100%; }
    }

    /* Brand watermark — M3 fade-in */
    .brand {
      width: 180px;
      height: auto;
      opacity: 0;
      animation: brand-in 400ms cubic-bezier(0.2, 0, 0, 1) 100ms forwards;
    }
    @keyframes brand-in {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 0.45; transform: scale(1); }
    }

    /* Dark mode (default): show light watermark */
    .brand-dark  { display: none; }
    .brand-light { display: block; }

    /* ── Light theme ───────────────────────────────────────────── */
    @media (prefers-color-scheme: light) {
      .splash { background: #fefbf6; }
      .brand-dark  { display: block; }
      .brand-light { display: none; }
    }

    /* ── M3 accelerated easing: fade-out on close ─────────────── */
    .splash.closing {
      animation: splash-out 300ms cubic-bezier(0.3, 0, 0.8, 0.15) forwards;
    }
    @keyframes splash-out {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="splash" data-tauri-drag-region>
    <div class="progress"></div>
    <img class="brand brand-light" src="logo-bolt-light.png" alt="Motrix Next" draggable="false" />
    <img class="brand brand-dark"  src="logo-bolt-dark.png"  alt="Motrix Next" draggable="false" />
  </div>
  <script>
    // Listen for close signal from main window — trigger M3 fade-out.
    if (window.__TAURI__) {
      window.__TAURI__.event.listen('splash-close', function () {
        document.querySelector('.splash').classList.add('closing');
      });
    }
  </script>
</body>
</html>
